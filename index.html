<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Cloud Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD8w635i-gDPR0tInGyvO82L6rfz5a9R74",
            authDomain: "controle-de-gastos-83bff.firebaseapp.com",
            databaseURL: "https://controle-de-gastos-83bff-default-rtdb.firebaseio.com",
            projectId: "controle-de-gastos-83bff",
            storageBucket: "controle-de-gastos-83bff.firebasestorage.app",
            messagingSenderId: "206236011422",
            appId: "1:206236011422:web:83554e33144e0b7e99e48f"
        };

        let db, refFin, gastos = [];

        window.salvarEAtualizar = function() {
            if (refFin) {
                refFin.set({
                    gastos: gastos,
                    s_dinheiro: document.getElementById('saldoDinheiro').value || 0,
                    s_cartao: document.getElementById('saldoCartao').value || 0
                }).catch(e => console.error("Erro ao salvar:", e));
            }
        };

        window.adicionarGasto = function() {
            const d = document.getElementById('desc').value;
            const v = parseFloat(document.getElementById('valor').value);
            const p = document.getElementById('prioridade').value;
            if (d && v > 0) {
                gastos.push({ desc: d, valor: v, prioridade: p, executado: false, id: Date.now() });
                window.salvarEAtualizar();
                document.getElementById('desc').value = '';
                document.getElementById('valor').value = '';
            }
        };

        window.editarGasto = function(id) {
            const idx = gastos.findIndex(g => g.id === id);
            const item = gastos[idx];
            
            // Preenche o formulário com os dados atuais
            document.getElementById('desc').value = item.desc;
            document.getElementById('valor').value = item.valor;
            document.getElementById('prioridade').value = item.prioridade;
            
            // Remove o item da lista para que o novo salvamento o substitua
            gastos.splice(idx, 1);
            window.salvarEAtualizar();
            
            // Rola a página para o topo para facilitar a edição
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.darBaixa = function(id) {
            const idx = gastos.findIndex(g => g.id === id);
            const item = gastos[idx];
            if (item.executado) {
                item.executado = false;
            } else {
                const vSug = item.valor.toFixed(2).replace('.', ',');
                const vPagoStr = prompt(`Confirmar pago: ${item.desc}\nPlanejado: R$ ${vSug}`, vSug);
                if (vPagoStr === null) return;
                const vPago = parseFloat(vPagoStr.replace(',', '.'));
                if (isNaN(vPago) || vPago < 0) return;

                if (vPago < item.valor) {
                    const resto = item.valor - vPago;
                    item.valor = vPago;
                    item.executado = true;
                    gastos.push({ desc: item.desc, valor: resto, prioridade: item.prioridade, executado: false, id: Date.now() + 1 });
                } else {
                    item.valor = vPago;
                    item.executado = true;
                }
            }
            window.salvarEAtualizar();
        };

        window.deletarGasto = function(id) {
            if (confirm("Excluir item?")) {
                gastos = gastos.filter(g => g.id !== id);
                window.salvarEAtualizar();
            }
        };

        function atualizarInterface() {
            const sD = parseFloat(document.getElementById('saldoDinheiro').value) || 0;
            const sC = parseFloat(document.getElementById('saldoCartao').value) || 0;
            const totalInic = sD + sC;
            const lista = document.getElementById('listaGastos');
            lista.innerHTML = '';
            let plan = 0, exec = 0;

            const pesos = { "P0": 1, "P1": 2, "P2": 3 };
            gastos.sort((a, b) => a.executado - b.executado || pesos[a.prioridade] - pesos[b.prioridade]);

            gastos.forEach(g => {
                plan += g.valor;
                if (g.executado) exec += g.valor;
                const div = document.createElement('div');
                div.className = `bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-slate-100 ${g.prioridade.toLowerCase()} ${g.executado ? 'opacity-40' : ''}`;
                
                // Botão de editar só aparece se NÃO estiver executado
                const btnEditar = !g.executado ? `<button onclick="window.editarGasto(${g.id})" class="text-[8px] font-bold uppercase text-indigo-400 mr-2">Editar</button>` : '';

                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <button onclick="window.darBaixa(${g.id})" class="w-8 h-8 rounded-full border-2 flex items-center justify-center ${g.executado ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200'}">
                            ${g.executado ? '✓' : ''}
                        </button>
                        <div>
                            <p class="font-bold text-slate-800 text-sm ${g.executado ? 'line-through' : ''}">${g.desc}</p>
                            <p class="text-[8px] font-black uppercase text-slate-400 tracking-tighter">${g.prioridade}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-slate-900 text-sm">R$ ${g.valor.toFixed(2)}</p>
                        <div class="flex justify-end">
                            ${btnEditar}
                            <button onclick="window.deletarGasto(${g.id})" class="text-[8px] font-bold uppercase text-slate-300">Excluir</button>
                        </div>
                    </div>`;
                lista.appendChild(div);
            });

            const saldoPrevisto = totalInic - plan;
            const saldoReal = totalInic - exec;

            document.getElementById('totalPlanejado').innerText = `R$ ${plan.toFixed(0)}`;
            document.getElementById('saldoReal').innerText = `R$ ${saldoReal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('saldoFinal').innerText = `R$ ${saldoPrevisto.toFixed(0)}`;
            
            const card = document.getElementById('statusCard');
            card.className = saldoPrevisto < 0 ? 
                "bg-red-600 text-white p-6 rounded-[2.5rem] shadow-xl mb-6 transition-all duration-500" : 
                "bg-slate-900 text-white p-6 rounded-[2.5rem] shadow-xl mb-6 transition-all duration-500";
        }

        window.onload = function() {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                refFin = db.ref('meu_financeiro');

                db.ref(".info/connected").on("value", (snap) => {
                    const label = document.getElementById('cloudStatus');
                    label.innerText = snap.val() ? "☁️ Sincronizado" : "⚠️ Offline";
                    label.className = snap.val() ? "text-[10px] font-bold text-emerald-500 uppercase tracking-widest text-center" : "text-[10px] font-bold text-amber-500 uppercase tracking-widest text-center";
                });

                refFin.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        gastos = data.gastos || [];
                        if (document.activeElement !== document.getElementById('saldoDinheiro'))
                            document.getElementById('saldoDinheiro').value = data.s_dinheiro || "";
                        if (document.activeElement !== document.getElementById('saldoCartao'))
                            document.getElementById('saldoCartao').value = data.s_cartao || "";
                        atualizarInterface();
                    }
                });
            } catch (e) {
                console.error("Erro Firebase:", e);
            }
        };
    </script>

    <style>
        .p0 { border-left: 6px solid #ef4444; }
        .p1 { border-left: 6px solid #f59e0b; }
        .p2 { border-left: 6px solid #3b82f6; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans text-slate-900">

    <div class="max-w-md mx-auto p-4">
        <header class="mb-6 text-center">
            <h1 class="text-xl font-black uppercase tracking-tighter italic">Financeiro Cloud</h1>
            <p id="cloudStatus" class="text-[10px] font-bold text-amber-500 uppercase italic tracking-widest text-center">Conectando...</p>
        </header>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[9px] text-slate-400 uppercase font-black text-center">Dinheiro</p>
                <input type="number" id="saldoDinheiro" oninput="window.salvarEAtualizar()" class="text-lg font-bold w-full outline-none text-emerald-600 bg-transparent text-center" placeholder="0.00">
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[9px] text-slate-400 uppercase font-black text-center">Cartão</p>
                <input type="number" id="saldoCartao" oninput="window.salvarEAtualizar()" class="text-lg font-bold w-full outline-none text-blue-600 bg-transparent text-center" placeholder="0.00">
            </div>
        </div>

        <div id="statusCard" class="bg-slate-900 text-white p-6 rounded-[2rem] shadow-xl mb-6">
            <div class="flex justify-between items-end mb-4">
                <div class="w-full text-center">
                    <p class="text-[10px] uppercase opacity-60 font-bold tracking-widest">Saldo Real Atual</p>
                    <h2 id="saldoReal" class="text-3xl font-black text-emerald-400">R$ 0,00</h2>
                </div>
            </div>
            <div class="flex justify-between text-[10px] font-black uppercase border-t border-white/10 pt-4 px-2">
                <span>Plano Total: <span id="totalPlanejado">R$ 0</span></span>
                <span>Sobrará: <span id="saldoFinal">R$ 0</span></span>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm mb-8 border border-slate-100">
            <div class="grid grid-cols-4 gap-2 mb-3">
                <input type="text" id="desc" placeholder="Item..." class="col-span-2 border-b-2 p-2 outline-none text-sm focus:border-indigo-500">
                <input type="number" id="valor" placeholder="R$" class="col-span-1 border-b-2 p-2 outline-none text-sm focus:border-indigo-500">
                <select id="prioridade" class="col-span-1 text-[10px] font-black border-b-2 bg-transparent outline-none uppercase">
                    <option value="P0">P0</option>
                    <option value="P1">P1</option>
                    <option value="P2">P2</option>
                </select>
            </div>
            <button onclick="window.adicionarGasto()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95 transition-all">
                Salvar Item
            </button>
        </div>

        <div id="listaGastos" class="space-y-3"></div>
    </div>
</body>
</html>
